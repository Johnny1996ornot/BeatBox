<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Beat Sequencer</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --primary-color: #00bcd4;
            --text-color: #ffffff;
            --cell-empty: #333333;
            --cell-kick: #ff4081;
            --cell-snare: #7c4dff;
            --cell-hihat: #00e676;
            --cell-current: #ffeb3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .sequencer-container {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        button#playBtn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button#playBtn:active {
            transform: scale(0.95);
        }

        button#playBtn.playing {
            background-color: #f44336;
        }

        .tempo-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: auto repeat(16, 1fr);
            gap: 8px;
            align-items: center;
        }

        .row-label {
            font-weight: bold;
            text-align: right;
            padding-right: 15px;
            color: #aaa;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .cell {
            width: 35px;
            height: 35px;
            background-color: var(--cell-empty);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.1s;
        }

        .cell:hover {
            transform: scale(1.1);
        }

        /* Active states for different instruments */
        .cell[data-instrument="kick"].active { background-color: var(--cell-kick); }
        .cell[data-instrument="snare"].active { background-color: var(--cell-snare); }
        .cell[data-instrument="hihat"].active { background-color: var(--cell-hihat); }

        /* Highlight for the current playing beat */
        .cell.current {
            border: 2px solid var(--cell-current);
            box-sizing: border-box;
            box-shadow: 0 0 10px var(--cell-current);
        }

        /* Visual dividers for every 4th beat (to help with 4/4 timing) */
        .cell:nth-child(4n + 2) {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <h1>BEAT SEQUENCER</h1>

    <div class="sequencer-container">
        <div class="controls">
            <button id="playBtn">▶ Play</button>
            
            <div class="tempo-control">
                <label for="bpmSlider">Tempo: <span id="bpmDisplay">120</span> BPM</label>
                <input type="range" id="bpmSlider" min="60" max="200" value="120">
            </div>
        </div>

        <div class="grid" id="grid">
            </div>
    </div>

    <script>
        // --- UI Setup ---
        const grid = document.getElementById('grid');
        const instruments = ['hihat', 'snare', 'kick']; // Ordered top to bottom
        const steps = 16;
        
        // Generate the grid HTML
        instruments.forEach(inst => {
            // Add row label
            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = inst;
            grid.appendChild(label);

            // Add 16 clickable steps for this instrument
            for (let i = 0; i < steps; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.instrument = inst;
                cell.dataset.step = i;
                cell.id = `cell-${inst}-${i}`;
                
                // Toggle active state on click
                cell.addEventListener('click', () => {
                    cell.classList.toggle('active');
                });
                
                grid.appendChild(cell);
            }
        });

        // --- Audio Engine Setup ---
        let audioCtx;
        let noiseBuffer;

        // Initialize Audio Context (must be done after user interacts with the page)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                createNoiseBuffer();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // We need white noise for the Snare and Hi-Hat to sound realistic
        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2; // 2 seconds of noise
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1; // White noise
            }
        }

        // --- Sound Synthesizers ---
        
        function playKick(time) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // A kick is a low frequency that drops very quickly
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.5);
            
            gainNode.gain.setValueAtTime(1, time);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
            
            osc.start(time);
            osc.stop(time + 0.5);
        }

        function playSnare(time) {
            // Snare part 1: The "snap" (Noise)
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1000;
            const noiseEnvelope = audioCtx.createGain();
            
            noiseEnvelope.gain.setValueAtTime(1, time);
            noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
            
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseEnvelope);
            noiseEnvelope.connect(audioCtx.destination);
            noiseSource.start(time);
            noiseSource.stop(time + 0.2);
            
            // Snare part 2: The "body" (Oscillator)
            const osc = audioCtx.createOscillator();
            const oscEnvelope = audioCtx.createGain();
            osc.type = 'triangle';
            
            osc.connect(oscEnvelope);
            oscEnvelope.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(250, time);
            oscEnvelope.gain.setValueAtTime(0.7, time);
            oscEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
            
            osc.start(time);
            osc.stop(time + 0.2);
        }

        function playHiHat(time) {
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            
            // Highpass filter makes the noise sound "tinny" like a cymbal
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 7000;
            
            const noiseEnvelope = audioCtx.createGain();
            noiseEnvelope.gain.setValueAtTime(0.5, time);
            // Very short decay for a tight closed hi-hat sound
            noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
            
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseEnvelope);
            noiseEnvelope.connect(audioCtx.destination);
            
            noiseSource.start(time);
            noiseSource.stop(time + 0.05);
        }

        // --- Sequencer Logic ---
        let isPlaying = false;
        let currentStep = 0;
        let nextNoteTime = 0.0;
        let tempo = 120;
        let timerID;
        const lookahead = 25.0; // How frequently to wake up and schedule notes (ms)
        const scheduleAheadTime = 0.1; // How far ahead to schedule audio (sec)

        function nextNote() {
            // Advance the time based on the tempo (calculating 16th notes)
            const secondsPerBeat = 60.0 / tempo;
            nextNoteTime += 0.25 * secondsPerBeat; // 0.25 represents a 16th note
            
            currentStep++;
            if (currentStep === 16) {
                currentStep = 0; // Loop back to the beginning
            }
        }

        function scheduleNote(stepNumber, time) {
            // Sync UI updates
            requestAnimationFrame(() => {
                // Clear old highlights
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('current'));
                // Add new highlights to current column
                instruments.forEach(inst => {
                    const cell = document.getElementById(`cell-${inst}-${stepNumber}`);
                    if (cell) cell.classList.add('current');
                });
            });

            // Check grid to see if a note is active on this step, and play it
            if (document.getElementById(`cell-kick-${stepNumber}`).classList.contains('active')) {
                playKick(time);
            }
            if (document.getElementById(`cell-snare-${stepNumber}`).classList.contains('active')) {
                playSnare(time);
            }
            if (document.getElementById(`cell-hihat-${stepNumber}`).classList.contains('active')) {
                playHiHat(time);
            }
        }

        function scheduler() {
            // While there are notes that will need to play before the next interval, schedule them
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime ) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            timerID = window.setTimeout(scheduler, lookahead);
        }

        // --- Event Listeners ---
        const playBtn = document.getElementById('playBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmDisplay = document.getElementById('bpmDisplay');

        playBtn.addEventListener('click', () => {
            initAudio(); // Browsers require audio context to be started by a user gesture
            
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                // Pre-set a basic pattern if the grid is completely empty
                const activeCells = document.querySelectorAll('.cell.active');
                if (activeCells.length === 0) {
                    // Kick on 1, 5, 9, 13
                    [0, 4, 8, 12].forEach(i => document.getElementById(`cell-kick-${i}`).classList.add('active'));
                    // Snare on 5, 13
                    [4, 12].forEach(i => document.getElementById(`cell-snare-${i}`).classList.add('active'));
                    // Hi-hat on every odd step
                    [0, 2, 4, 6, 8, 10, 12, 14].forEach(i => document.getElementById(`cell-hihat-${i}`).classList.add('active'));
                }

                currentStep = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
                playBtn.innerText = "⏸ Stop";
                playBtn.classList.add('playing');
            } else {
                window.clearTimeout(timerID);
                playBtn.innerText = "▶ Play";
                playBtn.classList.remove('playing');
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('current'));
            }
        });

        bpmSlider.addEventListener('input', (e) => {
            tempo = e.target.value;
            bpmDisplay.innerText = tempo;
        });
    </script>
</body>
</html>
